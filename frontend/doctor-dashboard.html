<!-- frontend/pages/doctor-dashboard.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Doctor Dashboard - PrescripLocator</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/dashboard.css" />
  </head>
  <body>
    <!-- Two-column dashboard shell: sidebar navigation plus main workspace. -->
    <div class="dash-layout">
      <!-- Sidebar navigation for doctor workflows. -->
      <aside class="sidebar">
        <div class="logo"> PrescripLocator</div>
        <nav>
          <a href="doctor-dashboard.html" class="active">Dashboard</a>
          <a href="#">Patients</a>
          <a href="#">Drug Directory</a>
        </nav>
        <div class="logout">
          <a href="#" onclick="logout()">Logout</a>
        </div>
      </aside>

      <!-- Main dashboard content for creating and reviewing prescriptions. -->
      <main class="main">
        <div class="main-header">
          <h1>Doctor Dashboard</h1>
          <div class="user-chip">
            <div class="avatar" id="avatarInitial"></div>
            <span id="userName"></span>
          </div>
        </div>

        <!-- Dashboard counters are filled from the recent prescriptions API. -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="label">Today's Prescriptions</div>
            <div class="value" id="todayCount">0</div>
          </div>
          <div class="stat-card">
            <div class="label">Total Prescriptions</div>
            <div class="value" id="totalCount">0</div>
          </div>
        </div>

        <div class="panels-row">
          <!-- Prescription form: patient email, drug search, and selected drugs. -->
          <div class="panel">
            <h3>Create Prescription</h3>

            <div class="field">
              <label>Patient Email</label>
              <input
                type="email"
                id="patientEmail"
                placeholder="Enter patient's registered email"
              />
            </div>

            <!-- Relative positioning lets the search dropdown sit under input. -->
            <div class="field" style="position: relative">
              <label>Search & Add Drug</label>
              <input
                type="text"
                id="drugSearch"
                placeholder="Search drug by name"
                oninput="searchDrugs()"
              />
              <div class="search-results" id="searchResults"></div>
            </div>

            <!-- Selected drug rows are generated by renderDrugLines(). -->
            <div id="drugLines"></div>

            <button class="btn-primary" onclick="generatePrescription()">
              Generate Prescription
            </button>

            <!-- Hidden until the backend returns a prescription code. -->
            <div class="generated-code" id="generatedCode"></div>
          </div>

          <!-- Recent prescriptions panel populated on page load and after save. -->
          <div class="panel">
            <h3>Recent Prescriptions</h3>
            <div class="rx-list" id="rxList">
              <p style="font-size: 13px; color: #999">Loading...</p>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="./js/auth-guard.js"></script>
    <script>
      // auth-guard.js provides the logged-in user object from localStorage.
      document.getElementById("userName").textContent = user.full_name;
      document.getElementById("avatarInitial").textContent = user.full_name
        .charAt(0)
        .toUpperCase();

      // Local draft state for the prescription before it is posted to the API.
      // Shape: { drug_id, name, dosage, duration, instructions }
      let selectedDrugs = [];

      // Search the drug catalogue as the doctor types.
      let searchTimeout;
      function searchDrugs() {
        clearTimeout(searchTimeout);
        const query = document.getElementById("drugSearch").value.trim();
        const resultsBox = document.getElementById("searchResults");

        // Avoid noisy API calls for very short queries.
        if (query.length < 2) {
          resultsBox.style.display = "none";
          return;
        }

        // Debounce the request so fast typing does not hit the API each key.
        searchTimeout = setTimeout(async () => {
          const res = await apiFetch(
            `/drugs/search?q=${encodeURIComponent(query)}`,
          );
          const drugs = await res.json();

          resultsBox.innerHTML = "";
          if (drugs.length === 0) {
            resultsBox.style.display = "none";
            return;
          }

          // Render each matching drug as a clickable dropdown option.
          drugs.forEach((drug) => {
            const div = document.createElement("div");
            div.textContent = `${drug.name} (${drug.category || "No category"})`;
            div.onclick = () => addDrugLine(drug);
            resultsBox.appendChild(div);
          });
          resultsBox.style.display = "block";
        }, 300);
      }

      // Add the chosen drug to the local prescription draft.
      function addDrugLine(drug) {
        selectedDrugs.push({
          drug_id: drug.id,
          name: drug.name,
          dosage: "",
          duration: "",
          instructions: "",
        });
        document.getElementById("drugSearch").value = "";
        document.getElementById("searchResults").style.display = "none";
        renderDrugLines();
      }

      // Remove a selected drug row by its current array position.
      function removeDrugLine(index) {
        selectedDrugs.splice(index, 1);
        renderDrugLines();
      }

      // Keep row inputs synchronized with the selectedDrugs draft array.
      function updateDrugField(index, field, value) {
        selectedDrugs[index][field] = value;
      }

      // Rebuild the selected drug rows whenever the draft list changes.
      function renderDrugLines() {
        const container = document.getElementById("drugLines");
        container.innerHTML = "";

        selectedDrugs.forEach((drug, i) => {
          const row = document.createElement("div");
          row.className = "drug-line";
          row.innerHTML = `
<span>${drug.name}</span>
<input placeholder="Dosage" value="${drug.dosage}" onchange="updateDrugField(${i}, 'dosage', this.value)">
<input placeholder="Duration" value="${drug.duration}" onchange="updateDrugField(${i}, 'duration', this.value)">
<input placeholder="Instructions" value="${drug.instructions}" onchange="updateDrugField(${i}, 'instructions', this.value)">
<button class="remove-btn" onclick="removeDrugLine(${i})">×</button>
`;
          container.appendChild(row);
        });
      }

      // Validate and submit the finished prescription draft.
      async function generatePrescription() {
        const patient_email = document
          .getElementById("patientEmail")
          .value.trim();
        const codeBox = document.getElementById("generatedCode");
        codeBox.style.display = "none";

        if (!patient_email) {
          alert("Please enter the patient email.");
          return;
        }
        if (selectedDrugs.length === 0) {
          alert("Please add at least one drug.");
          return;
        }

        // Dosage and duration are required for every drug line.
        for (const d of selectedDrugs) {
          if (!d.dosage || !d.duration) {
            alert(`Please fill dosage and duration for ${d.name}.`);
            return;
          }
        }

        const res = await apiFetch("/prescriptions", {
          method: "POST",
          body: JSON.stringify({ patient_email, drugs: selectedDrugs }),
        });
        const data = await res.json();

        if (!res.ok) {
          alert(data.message);
          return;
        }

        codeBox.textContent = `Prescription Created - Code: ${data.prescription_code}`;
        codeBox.style.display = "block";

        // Clear the form so the next prescription starts fresh.
        selectedDrugs = [];
        renderDrugLines();
        document.getElementById("patientEmail").value = "";

        loadRecentPrescriptions();
      }

      // Load recent prescriptions and derive dashboard stats from that list.
      async function loadRecentPrescriptions() {
        const res = await apiFetch("/prescriptions/doctor");
        const list = await res.json();

        document.getElementById("totalCount").textContent = list.length;

        const today = new Date().toDateString();
        const todayCount = list.filter(
          (p) => new Date(p.created_at).toDateString() === today,
        ).length;
        document.getElementById("todayCount").textContent = todayCount;

        const rxList = document.getElementById("rxList");
        rxList.innerHTML = "";

        if (list.length === 0) {
          rxList.innerHTML =
            '<p style="font-size:13px; color:#999;">No prescriptions yet.</p>';
          return;
        }

        // Show the newest prescription code, patient name, and local date.
        list.forEach((p) => {
          const date = new Date(p.created_at).toLocaleDateString();
          const item = document.createElement("div");
          item.className = "rx-item";
          item.innerHTML = `
<div>
<div class="code">${p.prescription_code}</div>
<div class="meta">${p.patient_name}</div>
</div>
<div class="meta">${date}</div>
`;
          rxList.appendChild(item);
        });
      }

      // Populate the dashboard as soon as the page is ready.
      loadRecentPrescriptions();
    </script>
  </body>
</html>
