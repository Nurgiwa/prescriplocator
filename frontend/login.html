<!-- frontend/pages/login.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - PrescripLocator</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Centered authentication layout shared by login and register pages. -->
    <div class="auth-container">
      <div class="auth-card">
        <!-- Brand mark displayed above the form. -->
        <div class="logo">
          <span>🏥 PrescripLocator</span>
        </div>

        <h2>Welcome Back!</h2>
        <p class="subtitle">Login to continue to your account</p>

        <!-- Hidden until validation or API errors need to be shown. -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Login form fields are read manually by handleLogin(). -->
        <div class="form-group">
          <label>Email or Phone</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          />
        </div>

        <button class="btn-primary" onclick="handleLogin()">Login</button>

        <div class="auth-footer">
          Don't have an account? <a href="register.html">Register</a>
        </div>
      </div>
    </div>

    <script>
      // Base backend URL used by this standalone frontend page.
      const API = "http://localhost:5000/api";

      // Validate the form, request a token, then route the user by role.
      async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorMsg = document.getElementById("errorMsg");

        // Hide previous error before checking the current submission.
        errorMsg.style.display = "none";

        if (!email || !password) {
          showError("Please enter your email and password.");
          return;
        }

        try {
          // Send credentials to the backend auth controller.
          const res = await fetch(`${API}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            showError(data.message);
            return;
          }

          // Persist the session so dashboard pages can call protected APIs.
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));

          // Send each role to its own dashboard page.
          const role = data.user.role;
          if (role === "doctor") window.location.href = "doctor-dashboard.html";
          if (role === "patient")
            window.location.href = "patient-dashboard.html";
          if (role === "pharmacist")
            window.location.href = "pharmacist-dashboard.html";
          if (role === "admin") window.location.href = "admin-dashboard.html";
        } catch (err) {
          showError(
            "Cannot connect to server. Make sure the backend is running.",
          );
        }
      }

      // Display a single inline error message inside the auth card.
      function showError(msg) {
        const errorMsg = document.getElementById("errorMsg");
        errorMsg.textContent = msg;
        errorMsg.style.display = "block";
      }
    </script>
  </body>
</html>
